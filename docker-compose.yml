services:
  db:
    image: postgres:15-alpine
    container_name: contacts_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: backend/CRUD.App/Dockerfile
    container_name: contacts_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AppDbContext: Host=db;Port=5432;Database=app_db;Username=postgres;Password=password
    ports:
      - "5000:8080"
